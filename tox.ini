[tox]
minversion = 4.11
requires =
    tox>=4.11
    tox-gh-actions>=3.1
isolated_build = true
skip_missing_interpreters = true
toxworkdir = {tox_root}/artifacts/root/tox
envlist =
    repository-contracts
    config-ssot
    evidence-governance
    evidence-completeness
    publish-readiness
    release-readiness-gate
    security
    test-{dev,core}
    lint-{dev,core}
    quality-{dev,core}
    security-{dev,core}
    build-{dev,core}
    sbom-{dev,core}
    docs

[gh-actions]
python =
    3.11: repository-contracts, config-ssot, evidence-governance, evidence-completeness, publish-readiness, release-readiness-gate, security, docs, test-dev, test-core, lint-dev, lint-core, quality-dev, quality-core, security-dev, security-core, build-dev, build-core, sbom-dev, sbom-core

[testenv]
package = skip
basepython = python3.11
skip_install = true
allowlist_externals = make
change_dir = {env:PACKAGE_DIR}
setenv =
    MONOREPO_ROOT = {tox_root}
    MAKEFLAGS = VENV={envdir} ACT={envdir}/bin
    PIP_DISABLE_PIP_VERSION_CHECK = 1
    PYTHONDONTWRITEBYTECODE = 1
    INSTALL_EXTRAS = dev

    dev: PACKAGE_MAKEFILE = {tox_root}/makes/packages/bijux-phylogenetics-dev.mk
    core: PACKAGE_MAKEFILE = {tox_root}/makes/packages/bijux-phylogenetics.mk

    dev: PACKAGE_DIR = {tox_root}/packages/bijux-phylogenetics-dev
    core: PACKAGE_DIR = {tox_root}/packages/bijux-phylogenetics
passenv =
    CI
    GITHUB_*
    GITLAB_*
    PIP_INDEX_URL
    PIP_EXTRA_INDEX_URL
    HTTP_PROXY
    HTTPS_PROXY
    NO_PROXY
    SSH_AUTH_SOCK
    LC_ALL
    LANG
    TC_BASE
    SBOM_CLI
    OPENAPI_GENERATOR_VERSION
    API_HOST
    API_PORT
    API_BASE_PATH
    API_FACTORY
commands_pre =
    dev,core: make -f {env:PACKAGE_MAKEFILE} install EXTRAS={env:INSTALL_EXTRAS} PACKAGE_INSTALL_SPEC=.[{env:INSTALL_EXTRAS}]
commands =
    test: make -f {env:PACKAGE_MAKEFILE} test-ci
    lint: make -f {env:PACKAGE_MAKEFILE} lint
    quality: make -f {env:PACKAGE_MAKEFILE} quality
    security: make -f {env:PACKAGE_MAKEFILE} security
    build: make -f {env:PACKAGE_MAKEFILE} build
    sbom: make -f {env:PACKAGE_MAKEFILE} sbom

[testenv:security]
package = skip
basepython = python3.11
allowlist_externals = make
change_dir = {tox_root}
commands =
    make security

[testenv:docs]
package = skip
basepython = python3.11
allowlist_externals = make
change_dir = {tox_root}
commands =
    make docs

[testenv:repository-contracts]
package = skip
basepython = python3.11
allowlist_externals = make
change_dir = {tox_root}
commands =
    make check-shared-bijux-py check-config-layout check-make-layout help

[testenv:evidence-governance]
package = skip
basepython = python3.11
allowlist_externals = make
change_dir = {tox_root}
commands =
    make check-evidence-governance

[testenv:evidence-completeness]
package = skip
basepython = python3.11
allowlist_externals = make
change_dir = {tox_root}
commands =
    make check-evidence-completeness

[testenv:config-ssot]
package = skip
basepython = python3.11
allowlist_externals = make
change_dir = {tox_root}
commands =
    make check-config-ssot

[testenv:publish-readiness]
package = skip
basepython = python3.11
allowlist_externals = make
change_dir = {tox_root}
commands =
    make report-release-readiness

[testenv:release-readiness-gate]
package = skip
basepython = python3.11
allowlist_externals = make
change_dir = {tox_root}
commands =
    make check-release-readiness
