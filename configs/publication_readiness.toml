[tool.bijux_phylogenetics.publication_readiness]
required_evidence_input_manifest = "inputs.manifest.json"
required_evidence_bundle_code_files = ["reference.R", "analysis.py"]
expected_publishable_packages = [
    "bijux-phylogenetics",
    "phylogenetic",
    "bijux-phylogenetics-dev",
]
target_shape_packages = [
    "bijux-phylogenetics",
    "phylogenetic",
    "bijux-phylogenetics-dev",
    "bijux-phylogenetics-evidence",
]
forbidden_runtime_subpackages = ["evidence"]
required_root_make_targets = [
    "report-package-bundles:",
    "check-package-bundles:",
    "report-publish-readiness:",
    "check-publish-readiness:",
]

[tool.bijux_phylogenetics.publication_readiness.package_policy."bijux-phylogenetics"]
package_dir = "packages/bijux-phylogenetics"
wheel_module_root = "bijux_phylogenetics"
allowed_dependencies = ["biopython>=1.87,<2.0"]
required_sdist_entries = [
    "README.md",
    "CHANGELOG.md",
    "LICENSE",
    "NOTICE",
    "src/bijux_phylogenetics/__init__.py",
    "src/bijux_phylogenetics/cli.py",
]
required_wheel_entries = [
    "bijux_phylogenetics/__init__.py",
    "bijux_phylogenetics/cli.py",
    "bijux_phylogenetics/py.typed",
]
forbidden_archive_prefixes = [
    "tests/",
    "docs/",
    "evidence-book/",
    "artifacts/",
]

[tool.bijux_phylogenetics.publication_readiness.package_policy."phylogenetic"]
package_dir = "packages/phylogenetic"
wheel_module_root = "phylogenetic"
allowed_dependencies = ["bijux-phylogenetics>=0.1.0,<1.0"]
required_sdist_entries = [
    "README.md",
    "CHANGELOG.md",
    "LICENSE",
    "NOTICE",
    "src/phylogenetic/__init__.py",
    "src/phylogenetic/cli.py",
]
required_wheel_entries = [
    "phylogenetic/__init__.py",
    "phylogenetic/cli.py",
    "phylogenetic/py.typed",
]
forbidden_archive_prefixes = [
    "tests/",
    "docs/",
    "evidence-book/",
    "artifacts/",
]

[tool.bijux_phylogenetics.publication_readiness.package_policy."bijux-phylogenetics-dev"]
package_dir = "packages/bijux-phylogenetics-dev"
wheel_module_root = "bijux_phylogenetics_dev"
allowed_dependencies = ["PyYAML>=6.0,<7.0"]
required_sdist_entries = [
    "README.md",
    "CHANGELOG.md",
    "LICENSE",
    "NOTICE",
    "src/bijux_phylogenetics_dev/__init__.py",
    "src/bijux_phylogenetics_dev/release/publication_guard.py",
]
required_wheel_entries = [
    "bijux_phylogenetics_dev/__init__.py",
    "bijux_phylogenetics_dev/release/publication_guard.py",
    "bijux_phylogenetics_dev/py.typed",
]
forbidden_archive_prefixes = [
    "tests/",
    "docs/",
    "evidence-book/",
    "artifacts/",
]
