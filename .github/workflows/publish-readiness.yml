name: publish-readiness

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-readiness.yml"
      - "configs/**"
      - "evidence-book/**"
      - "makes/**"
      - "packages/**"
      - "tox.ini"
      - "uv.lock"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/publish-readiness.yml"
      - "configs/**"
      - "evidence-book/**"
      - "makes/**"
      - "packages/**"
      - "tox.ini"
      - "uv.lock"
  workflow_dispatch:
    inputs:
      enforce_release_gate:
        description: "Run the failing release-readiness gate instead of report-only mode"
        required: false
        default: false
        type: boolean
  merge_group:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: publish-readiness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-readiness-report:
    name: publish-readiness-report
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: 3.11
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: check config and build release-readiness reports
        shell: bash
        run: |
          set -euo pipefail
          make check-config-ssot
          make report-release-readiness
      - name: upload publish-readiness artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: publish-readiness
          path: |
            artifacts/root/package-bundles
            artifacts/root/package-bundles.json
            artifacts/root/publish-readiness.json
            artifacts/root/artifact-governance.json
          if-no-files-found: error
          retention-days: 14

  release-readiness-gate:
    name: release-readiness-gate
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.enforce_release_gate }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: 3.11
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: enforce release-readiness gate
        shell: bash
        run: |
          set -euo pipefail
          make check-release-readiness
