name: repository-governance

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/repository-governance.yml"
      - "configs/**"
      - "makes/**"
      - "packages/**"
      - "tox.ini"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/repository-governance.yml"
      - "configs/**"
      - "makes/**"
      - "packages/**"
      - "tox.ini"
  workflow_dispatch:
  merge_group:
    branches:
      - main

permissions:
  contents: read
  actions: read
  pull-requests: read

concurrency:
  group: repository-governance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy-gate:
    name: policy-prerequisites
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - name: wait for policy and standards prerequisites
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 .github/scripts/check_workflow_prerequisites.py

  repository-contracts:
    name: repository-contracts
    needs: policy-gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: 3.11
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: audit repository contracts
        shell: bash
        run: |
          set -euo pipefail
          tox -e repository-contracts

  config-ssot:
    name: config-ssot
    needs: policy-gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: 3.11
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: audit config ssot
        shell: bash
        run: |
          set -euo pipefail
          tox -e config-ssot
          make check-execution-surfaces
      - name: upload config governance artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: repository-governance
          path: |
            artifacts/root/config-ssot-audit.json
            artifacts/root/execution-surfaces.json
          if-no-files-found: error
          retention-days: 14
