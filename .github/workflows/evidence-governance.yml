name: evidence-governance

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/evidence-governance.yml"
      - "evidence-book/**"
      - "makes/**"
      - "packages/**"
      - "tox.ini"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/evidence-governance.yml"
      - "evidence-book/**"
      - "makes/**"
      - "packages/**"
      - "tox.ini"
  workflow_dispatch:
  merge_group:
    branches:
      - main

permissions:
  contents: read
  actions: read
  pull-requests: read

concurrency:
  group: evidence-governance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy-gate:
    name: policy-prerequisites
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - name: wait for policy and standards prerequisites
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 .github/scripts/check_workflow_prerequisites.py

  evidence-contracts:
    name: evidence-contracts
    needs: policy-gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: 3.11
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: install tox runner
        shell: bash
        run: |
          set -euo pipefail
          uv tool install tox --with tox-gh-actions
      - name: validate evidence governance
        shell: bash
        run: |
          set -euo pipefail
          tox -e evidence-governance,evidence-completeness
      - name: upload evidence governance artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: evidence-governance
          path: |
            artifacts/root/evidence-book-validation.json
            artifacts/root/evidence-completeness.json
            artifacts/root/artifact-governance.json
          if-no-files-found: error
          retention-days: 14

  evidence-cleanroom:
    name: evidence-cleanroom
    needs: policy-gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0
      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: 3.11
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: rerun selected evidence clean-room checks
        shell: bash
        run: |
          set -euo pipefail
          make rerun-governed-evidence-cleanroom
      - name: upload clean-room artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: evidence-cleanroom
          path: artifacts/root/evidence-cleanroom
          if-no-files-found: error
          retention-days: 14
