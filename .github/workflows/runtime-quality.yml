name: runtime-quality

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/runtime-quality.yml"
      - "configs/**"
      - "makes/**"
      - "packages/bijux-phylogenetics/**"
      - "tox.ini"
      - "uv.lock"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/runtime-quality.yml"
      - "configs/**"
      - "makes/**"
      - "packages/bijux-phylogenetics/**"
      - "tox.ini"
      - "uv.lock"
  workflow_dispatch:
  merge_group:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: runtime-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  runtime-quality:
    name: runtime-quality
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548
        with:
          python-version: 3.11
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: run runtime quality surfaces
        shell: bash
        run: |
          set -euo pipefail
          tox -e lint-core,test-core,quality-core,build-core,sbom-core
