[tool.bijux_phylogenetics.publication_readiness]
required_evidence_input_manifest = "inputs.manifest.json"
required_evidence_bundle_code_files = ["reference.R", "analysis.py"]
required_evidence_bundle_artifacts = [
    "reference.R",
    "analysis.py",
    "checks.json",
    "report.md",
    "provenance.json",
]
expected_publishable_packages = [
    "bijux-phylogenetics",
    "phylogenetic",
    "bijux-phylogenetics-dev",
]
target_shape_packages = [
    "bijux-phylogenetics",
    "phylogenetic",
    "bijux-phylogenetics-dev",
]
required_root_make_targets = [
    "list-evidence-studies:",
    "build-evidence-book:",
    "build-evidence-study:",
    "validate-evidence-book:",
    "report-evidence-completeness:",
    "check-evidence-completeness:",
    "report-evidence-governance:",
    "check-evidence-governance:",
    "sync-evidence-artifacts:",
    "check-evidence-artifacts:",
    "report-artifact-governance:",
    "check-artifact-governance:",
    "report-execution-surfaces:",
    "check-execution-surfaces:",
    "report-package-boundaries:",
    "check-package-boundaries:",
    "report-package-bundles:",
    "check-package-bundles:",
    "report-publish-readiness:",
    "check-publish-readiness:",
    "report-release-readiness:",
    "check-release-readiness:",
]

[tool.bijux_phylogenetics.publication_readiness.target_repository_shape]
canonical_runtime_package = "bijux-phylogenetics"
compatibility_alias_package = "phylogenetic"
maintainer_package = "bijux-phylogenetics-dev"
evidence_book_root = "evidence-book"
runtime_example_input_root = "packages/bijux-phylogenetics/src/bijux_phylogenetics/resources/examples"
runtime_bundle_contract_module = "bijux_phylogenetics.provenance.bundles"
evidence_bundle_contract_module = "bijux_phylogenetics.evidence.bundles"

[tool.bijux_phylogenetics.publication_readiness.package_policy."bijux-phylogenetics"]
package_dir = "packages/bijux-phylogenetics"
wheel_module_root = "bijux_phylogenetics"
allowed_dependencies = [
    "biopython>=1.87,<2.0",
    "cairosvg>=2.9.0,<3.0",
    "defusedxml>=0.7.1,<1.0",
    "PyYAML>=6.0,<7.0",
]
required_sdist_entries = [
    "README.md",
    "CHANGELOG.md",
    "LICENSE",
    "NOTICE",
    "src/bijux_phylogenetics/__init__.py",
    "src/bijux_phylogenetics/command_line/__init__.py",
    "src/bijux_phylogenetics/resources/examples/alignments/example_alignment.fasta",
    "src/bijux_phylogenetics/resources/examples/trees/example_tree.nwk",
    "src/bijux_phylogenetics/resources/datasets/mammals/primate_comparative/tree.nwk",
    "src/bijux_phylogenetics/resources/datasets/mammals/primate_comparative/traits.csv",
    "src/bijux_phylogenetics/resources/datasets/pathogens/rabies_cross_host_geography_panel/workflow-config.json",
]
required_wheel_entries = [
    "bijux_phylogenetics/__init__.py",
    "bijux_phylogenetics/command_line/__init__.py",
    "bijux_phylogenetics/py.typed",
    "bijux_phylogenetics/resources/examples/alignments/example_alignment.fasta",
    "bijux_phylogenetics/resources/examples/trees/example_tree.nwk",
    "bijux_phylogenetics/resources/datasets/mammals/primate_comparative/tree.nwk",
    "bijux_phylogenetics/resources/datasets/mammals/primate_comparative/traits.csv",
    "bijux_phylogenetics/resources/datasets/pathogens/rabies_cross_host_geography_panel/workflow-config.json",
]
forbidden_archive_prefixes = [
    "tests/",
    "docs/",
    "evidence-book/",
    "artifacts/",
]

[tool.bijux_phylogenetics.publication_readiness.package_policy."phylogenetic"]
package_dir = "packages/phylogenetic"
wheel_module_root = "phylogenetic"
allowed_dependencies = ["bijux-phylogenetics>=0.1.0,<1.0"]
