[mypy]
python_version = 3.11
strict = true
pretty = true
show_error_codes = true
warn_unreachable = true
warn_unused_configs = true
warn_unused_ignores = true
namespace_packages = true
plugins = pydantic.mypy
mypy_path = src
files = src
exclude = ^(\.venv|build|dist|docs|htmlcov|\.mypy_cache|\.pytest_cache|\.ruff_cache|\.tox|__pycache__|migrations|\.egg-info|node_modules|artifacts|site)/

[pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true
warn_untyped_fields = true

[mypy-bijux_phylogenetics.*]
disable_error_code = attr-defined, no-untyped-def, assignment, arg-type, no-untyped-call, no-redef, call-overload, operator, misc, no-any-return, index, var-annotated, union-attr, return-value, unreachable
